<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications - Health Secure</title>
    <link rel="stylesheet" href="css/notif-alert.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <h2>Health Secure</h2>
        </div>
        <ul>
            <li><a href="policyholder-dashboard.html"><i class="fa-solid fa-house"></i> Dashboard</a></li>
            <li><a href="submit-claim.html"><i class="fa-solid fa-file-medical"></i> My Claims</a></li>
            <li><a href="claimtracking.html"><i class="fa-solid fa-magnifying-glass"></i> Track Claim</a></li>
            <li class="active"><a href="#"><i class="fa-solid fa-bell"></i> Notifications</a></li>
            <li><a href="../index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <!-- Topbar -->
        <div class="topbar">
            <h3>Notifications</h3>
            <div class="topbar-right">
                <button class="mark-all-btn" onclick="markAllRead()">
                    <i class="fa-solid fa-check-double"></i> Mark All as Read
                </button>
                <img src="../images/m-img.svg" alt="avatar">
                </div>
                </div>

                <!-- Filter Tabs -->
                <div class="tabs">
                <button class="tab active" onclick="filterTab(this, 'all')">All</button>
                <button class="tab" onclick="filterTab(this, 'unread')">Unread</button>
                <button class="tab" onclick="filterTab(this, 'approved')">Approved</button>
                <button class="tab" onclick="filterTab(this, 'pending')">Pending</button>
                <button class="tab" onclick="filterTab(this, 'rejected')">Rejected</button>
                </div>

                <!-- Notifications List -->
                <div class="notifications-list" id="notificationsList">
                <!-- Loaded by JS -->
                </div>

                <!-- Empty State -->
                <div class="empty-state" id="emptyState" style="display:none;">
                <i class="fa-solid fa-bell-slash"></i>
                <p>No notifications found</p>
                </div>

                </div>

                <script src="js/notifications.js"></script>
                </body>

</html>
