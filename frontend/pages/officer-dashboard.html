<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Officer Dashboard</title>
    <link rel="stylesheet" href="../css/officer-dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
     <div class="sidebar">

    <h2>Officer Panel</h2>

    <ul>
        <li><i class="fa-solid fa-house"></i> Dashboard</li>
        <li><i class="fa-solid fa-file-medical"></i> Claims Review</li>
        <li><i class="fa-solid fa-triangle-exclamation"></i> Fraud Alerts</li>
        <li><i class="fa-solid fa-chart-line"></i> Reports</li>
        <li><i class="fa-solid fa-bell"></i> Notifications</li>
        <li><i class="fa-solid fa-right-from-bracket"></i> Logout</li>
    </ul>

</div>
    <div class="main-content">
        <header>
            <h1>Claims Review</h1>
        </header>
        <div class="claims-table">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Policyholder</th>
                        <th>Treatment</th>
                        <th>Amount</th>
                        <th>Fraud Score</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="officer-claims">
                    <!-- Claims will be loaded here -->
                </tbody>
            </table>
        </div>
    </div>
    <script src="../js/officer.js"></script>
</body>
</html>
