<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Claim</title>
    <link rel="stylesheet" href="../css/submit-claim.css">
</head>
<body>

<div class="container">

    <div class="claim-box">
        <h1>Submit Insurance Claim</h1>

        <form>

            <div class="input-group">
                <label>Patient Name</label>
                <input type="text" placeholder="Enter Patient Name">
            </div>

            <div class="input-group">
                <label>Patient CNIC</label>
                <input type="text" placeholder="XXXXX-XXXXXXX-X">
            </div>

            <div class="input-group">
                <label>Policy Number</label>
                <input type="text" placeholder="Enter Policy Number">
            </div>

            <div class="input-group">
                <label>Hospital Name</label>
                <input type="text" placeholder="Enter Hospital Name">
            </div>

            <div class="input-group">
                <label>Disease / Treatment</label>
                <input type="text" placeholder="Enter Treatment Details">
            </div>

            <div class="input-group">
                <label>Claim Amount (PKR)</label>
                <input type="number" placeholder="Enter Amount">
            </div>

            <div class="input-group">
                <label>Treatment Date</label>
                <input type="date">
            </div>

            <div class="input-group">
                <label>Upload Medical Report</label>
                <input type="file">
            </div>

            <div class="input-group">
                <label>Upload Hospital Bill</label>
                <input type="file">
            </div>

            <div class="input-group">
                <label>Additional Notes</label>
                <textarea rows="4" placeholder="Enter Notes"></textarea>
            </div>

            <button type="submit">Submit Claim</button>

        </form>
    </div>

</div>

    <script src="../js/hospital.js"></script>
</body>
</html>
