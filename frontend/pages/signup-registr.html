<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Health Secure</title>
    <link rel="stylesheet" href="../css/sign-reg.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="container">
        <div class="signup-box">

            <!-- Left Panel -->
            <div class="left-panel">
                <img src="../images/m-img.svg" alt="logo">
                <h1>Health Secure</h1>
                <p>Your trusted health insurance platform. Submit claims, track status, and stay protected.</p>
                <div class="features">
                    <div class="feature-item">
                        <i class="fa-solid fa-shield-halved"></i>
                        <span>Secure & Encrypted</span>
                    </div>
                    <div class="feature-item">
                        <i class="fa-solid fa-clock"></i>
                        <span>Fast Claim Processing</span>
                    </div>
                    <div class="feature-item">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Trusted by Hospitals</span>
                    </div>
                </div>
            </div>

            <!-- Right Panel -->
            <div class="right-panel">
                <h2>Create Account</h2>
                <p class="subtitle">Fill in the details below to get started</p>

                <form>

                    <!-- Full Name -->
                    <div class="input-group">
                        <label>Full Name</label>
                        <div class="input-box">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" placeholder="Enter your full name" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="input-group">
                        <label>Email Address</label>
                        <div class="input-box">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" placeholder="Enter your email" required>
                        </div>
                    </div>

                    <!-- CNIC -->
                    <div class="input-group">
                        <label>CNIC</label>
                        <div class="input-box">
                            <i class="fa-solid fa-id-card"></i>
                            <input type="text" placeholder="XXXXX-XXXXXXX-X" maxlength="15" required>
                        </div>
                    </div>

                    <!-- Phone -->
                    <div class="input-group">
                        <label>Phone Number</label>
                        <div class="input-box">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" placeholder="+92 300 0000000" required>
                        </div>
                    </div>

                    <!-- Role -->
                    <div class="input-group">
                        <label>Register As</label>
                        <div class="input-box">
                            <i class="fa-solid fa-user-tag"></i>
                            <select required>
                                <option value="" disabled selected>Select your role</option>
                                <option value="policyholder">Policyholder</option>
                                <option value="hospital">Hospital Staff</option>
                                <option value="officer">Insurance Officer</option>
                            </select>
                        </div>
                    </div>

                    <!-- Password -->
                    <div class="input-group">
                        <label>Password</label>
                        <div class="input-box">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="Create a password" required>
                            <i class="fa-solid fa-eye toggle-eye" onclick="togglePassword('password', this)"></i>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <div class="input-box">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                            <i class="fa-solid fa-eye toggle-eye" onclick="togglePassword('confirmPassword', this)"></i>
                        </div>
                    </div>

                    <!-- Terms -->
                    <div class="terms">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">I agree to the <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a></label>
                    </div>

                    <!-- Submit -->
                    <button type="submit" class="signup-btn">Create Account</button>

                    <p class="login-link">Already have an account? <a href="login.html">Login here</a></p>

                </form>
            </div>

        </div>
    </div>

    <script>
        function togglePassword(fieldId, icon) {
            const input = document.getElementById(fieldId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }
    </script>

</body>
</html>
