<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Tracking</title>
    <link rel="stylesheet" href="../css/claimtracking.css">
</head>
<body>

    <div class="container">

        <div class="tracking-box">

            <h1>Track Insurance Claim</h1>

            <div class="search-section">
                <input type="text" placeholder="Enter Claim ID">
                <button>Track Claim</button>
            </div>

            <div class="claim-details">

                <h2>Claim Details</h2>

                <div class="detail-row">
                    <span>Claim ID</span>
                    <span>CLM1001</span>
                </div>

                <div class="detail-row">
                    <span>Policy Number</span>
                    <span>POL56789</span>
                </div>

                <div class="detail-row">
                    <span>Hospital</span>
                    <span>City Hospital</span>
                </div>

                <div class="detail-row">
                    <span>Claim Amount</span>
                    <span>PKR 25,000</span>
                </div>

                <div class="detail-row">
                    <span>Submission Date</span>
                    <span>06-Jun-2026</span>
                </div>

                <div class="detail-row">
                    <span>Status</span>
                    <span class="status approved">Approved</span>
                </div>

            </div>

        </div>

    </div>

</body>
</html>
